version: '3'

tasks:
  # TODO: Make sure we have the easyeffects Pulse Audio source (and on that
  # note, we should dump the config here)
  # TODO: Ensure that ydotool is running
  run-client:
    deps: [prepare-client, build-client-ui]
    dir: packages/active-listener
    cmds:
      - uv run al --audio-device default --ui-bin ./../active-listener-ui-electron/dist/linux-unpacked/active-listener-ui

  prepare-client:
    dir: packages/active-listener
    cmds:
      - uv sync --all-extras --all-groups

  prepare-client-lib:
    desc: Install client library dependencies
    dir: packages/client
    cmds:
      - uv sync --all-extras --all-groups

  transcribe-file:
    desc: Transcribe a local audio file (set audio_file=/path/to/audio.wav)
    deps: [prepare-client-lib]
    dir: packages/client
    vars:
      host: '{{default "localhost" .host}}'
      port: '{{default "9090" .port}}'
    requires:
      vars: [audio_file]
    cmds:
      - uv run python -m eavesdrop.client.transcribe_file_cli --audio-file "{{.audio_file}}" --host "{{.host}}" --port {{.port}} {{.CLI_ARGS}}

  run-mic-client:
    desc: Start microphone transcription client
    deps: [prepare-client-lib]
    dir: packages/client
    vars:
      host: '{{default "localhost" .host}}'
      port: '{{default "9090" .port}}'
      audio_device: '{{default "default" .audio_device}}'
    cmds:
      - uv run python examples/simple_transcriber.py --server "{{.host}}:{{.port}}" --audio-device "{{.audio_device}}" --model "distil-small.en" {{.CLI_ARGS}}

  build-client-ui:
    dir: packages/active-listener-ui-electron
    sources:
      - resources/*.*
      - src/**/*.ts
      - src/**/*.css
      - src/**/*.html
      - electron-builder.yml
      - electron.vite.config.ts
      - pnpm-lock.yaml
      - tsconfig.json
      - tsconfig.*.json
    generates:
      - dist/linux-unpacked/*
      - dist/linux-unpacked/*.pak
      - dist/linux-unpacked/*.so
    cmds:
      - pnpm install
      - pnpm run build:linux:dev

  prepare-server:
    desc: Install server dependencies
    dir: packages/server
    cmds:
      - uv sync --all-extras --all-groups

  run-server:
    desc: Start the transcription server with local config
    deps: [prepare-server]
    dir: packages/server
    cmds:
      - uv run eavesdrop-server --config config.yaml

  build-server-image:
    # Verified ROCm build settings on AMD Framework 13 (Ryzen 7840U / Radeon 780M).
    desc: Build ROCm base and server images
    dir: packages
    sources:
      - server/src/**/*.py
      - server/docker/*
      - server/.dockerignore
      - server/uv.lock
    vars:
      SERVER_IMAGE: '{{default "ghcr.io/shyndman/lmnop-eavesdrop:latest" .SERVER_IMAGE}}'
      ROCM_BASE_IMAGE: '{{default "eavesdrop-rocm-base" .ROCM_BASE_IMAGE}}'
      GFX_ARCH: '{{default "gfx1030;gfx1100" .GFX_ARCH}}'
      HSA_OVERRIDE_GFX_VERSION: '{{default "11.0.0" .HSA_OVERRIDE_GFX_VERSION}}'
    cmds:
      - echo "GFX_ARCH = {{.GFX_ARCH}}"
      - echo "HSA_OVERRIDE_GFX_VERSION = {{.HSA_OVERRIDE_GFX_VERSION}}"

      - docker build --pull --no-cache --progress=plain -f server/docker/Dockerfile.rocm-base --build-arg GFX_ARCH='{{.GFX_ARCH}}' --build-arg HSA_OVERRIDE_GFX_VERSION='{{.HSA_OVERRIDE_GFX_VERSION}}' -t {{.ROCM_BASE_IMAGE}} .
      - docker build --no-cache --progress=plain -f server/docker/Dockerfile --build-arg BASE_IMAGE={{.ROCM_BASE_IMAGE}} -t {{.SERVER_IMAGE}} .

  run-server-image:
    # Verified ROCm runtime flags on AMD Framework 13 (Ryzen 7840U / Radeon 780M).
    desc: Run the server Docker image with ROCm runtime flags
    deps: [build-server-image]
    dir: packages/server
    vars:
      SERVER_IMAGE: '{{default "ghcr.io/shyndman/lmnop-eavesdrop:latest" .SERVER_IMAGE}}'
      HSA_OVERRIDE_GFX_VERSION: '{{default "11.0.0" .HSA_OVERRIDE_GFX_VERSION}}'
    cmds:
      - docker run --interactive --tty
        --device /dev/kfd
        --device /dev/dri
        --security-opt seccomp=unconfined
        --rm
        --publish '9090:9090'
        --name eavesdrop
        --env HSA_OVERRIDE_GFX_VERSION='{{.HSA_OVERRIDE_GFX_VERSION}}'
        --volume "$HOME/.cache/lmnop/eavesdrop-models:/root/.cache/eavesdrop"
        --volume "$PWD/config.yaml:/app/server/config.yaml:ro"
        --env EAVESDROP_CONFIG=/app/server/config.yaml
        {{.SERVER_IMAGE}} -m eavesdrop.server
