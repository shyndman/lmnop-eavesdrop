[project]
name = "eavesdrop-client"
version = "0.0.0"
description = "Python library for Eavesdrop real-time transcription services"
readme = "README.md"
authors = [{name = "shyndman", email = "scotty.hyndman@gmail.com"}]
requires-python = ">=3.12.3,<3.13"
dependencies = [
    "eavesdrop-common",
    "eavesdrop-wire",
    "numpy<2",
    "pydantic>=2",
    "sounddevice>=0.5.2",
    "structlog>=25.4.0",
    "websockets>=13.0",
]


[project.urls]
repository = "https://github.com/shyndman/eavesdrop"
"Bug Tracker" = "https://github.com/shyndman/eavesdrop/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eavesdrop"]

[tool.uv.sources]
eavesdrop-wire = {path = "../wire", editable = true}
eavesdrop-common = { path = "../common", editable = true }

[tool.basedpyright]
include = ["src"]
ignore = ["**/.venv"]
extraPaths = ["../wire/src", "../common/src"]
defineConstant = {DEBUG = true}
reportMissingImports = "error"
deprecateTypingAliases = true
reportDeprecated = "information"
pythonPlatform = "Linux"

[tool.ruff]
line-length = 100
target-version = "py312"
indent-width = 2

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["eavesdrop"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[dependency-groups]
dev = [
    "basedpyright>=1.35.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.24.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
