[project]
name = "eavesdrop-server"
version = "0.0.0"
description = "Real-time audio transcription server with WebSocket-based speech-to-text services"
authors = [{name = "shyndman", email = "scotty.hyndman@gmail.com"}]
requires-python = ">=3.12.3,<3.13"
dependencies = [
  "eavesdrop-common",
  "eavesdrop-wire",
  "evaluate",
  "jiwer",
  "kaldialign",
  "netifaces>=0.11.0",
  "numba",
  "numpy<2",
  "psutil",
  "pydantic>=2",
  "pyyaml>=6.0",
  "sentencepiece",
  "soundfile",
  "structlog>=25.4.0",
  "websocket-client>=1.8.0",
  "websockets>=13.0",
  # These are installed via other means (see Dockerfile)
  # "tokenizers==0.20.3",
  # "transformers[torch]==4.54",
  # "faster-whisper==1.2.1",
  # "openai-whisper==20240930",
  # "ctranslate2 @ file:///~/dev/github.com/ctranslate2",
  # "tokenizers>=0.22.0",
]
license = {text = "MIT"}


[project.urls]
repository = "https://github.com/shyndman/eavesdrop"
"Bug Tracker" = "https://github.com/shyndman/eavesdrop/issues"

[project.scripts]
eavesdrop-server = "eavesdrop.server.__main__:main"
eavesdrop-debug-vad = "eavesdrop.server.debug_vad:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eavesdrop"]

[dependency-groups]
dev = [
    "basedpyright>=1.35.0",
    "pyfakefs>=5.9.3",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.24.0",
]
# Host-only typing deps for packages provided by the ROCm image at runtime.
type_checkable = [
  "ctranslate2==4.6.0",
  "torch==2.10.0",
  "torchaudio==2.10.0",
  "faster-whisper==1.2.1",
  "tokenizers==0.22.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.basedpyright]
include = ["src", "tests"]
ignore = ["**/.venv"]
extraPaths = ["../wire/src", "../common/src"]
defineConstant = {DEBUG = true}
pythonPlatform = "Linux"
deprecateTypingAliases = true

# Diagnostic rules — explicitly configured based on project review
reportMissingImports = "error"
reportDeprecated = "information"
reportUnknownMemberType = "error"           # Keep: catches type info loss from untyped libs
reportUnannotatedClassAttribute = "error"   # Keep: requires explicit types on class attributes
reportUnknownVariableType = "error"         # Keep: fix via local stubs + typed Pydantic validators

[tool.ruff]
line-length = 100
target-version = "py312"
indent-width = 2

[tool.ruff.lint.flake8-tidy-imports]
# Disallow all relative imports.
ban-relative-imports = "all"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["eavesdrop"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.uv.sources]
eavesdrop-wire = {path = "../wire", editable = true}
torch = {index = "pytorch-cpu"}
torchaudio = {index = "pytorch-cpu"}
eavesdrop-common = { path = "../common", editable = true }

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"
default = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
