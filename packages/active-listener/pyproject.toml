[project]
name = "active-listener"
version = "0.1.0"
description = "Keyboard-driven workstation dictation service"
readme = "README.md"
authors = [
    { name = "Scott Hyndman", email = "scotty.hyndman@gmail.com" }
]
requires-python = ">=3.12.3,<3.13"
dependencies = [
    "clypi>=1.8.2",
    "eavesdrop-client",
    "eavesdrop-common",
    "evdev>=1.9.3",
    "langfuse>=4.5.1",
    "litert-lm>=0.10,<0.11",
    "numpy<2",
    "pydantic>=2",
    "pydantic-ai-slim[google]>=1.87.0",
    "pyyaml>=6",
    "sdbus>=0.12.0",
    "structlog>=25.4.0",
]

[project.scripts]
active-listener = "active_listener:main"

[build-system]
requires = ["uv_build>=0.9.27,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
eavesdrop-client = { workspace = true }
eavesdrop-common = { workspace = true }

[tool.basedpyright]
include = ["src", "tests"]
ignore = ["**/.venv"]
extraPaths = ["../client/src", "../wire/src", "../common/src"]
defineConstant = { DEBUG = true }
reportMissingImports = "error"
deprecateTypingAliases = true
reportDeprecated = "information"
pythonPlatform = "Linux"

executionEnvironments = [
  { root = "tests", reportAny = "none", reportExplicitAny = "none", reportImplicitOverride = "none", reportMissingTypeStubs = "none", reportMissingParameterType = "none", reportMissingTypeArgument = "none", reportPrivateUsage = "none", reportUnannotatedClassAttribute = "none", reportUnnecessaryCast = "none", reportUnknownArgumentType = "none", reportUnknownLambdaType = "none", reportUnknownMemberType = "none", reportUnknownParameterType = "none", reportUnknownVariableType = "none", reportUnusedCallResult = "none", reportUnusedImport = "none", reportUnusedParameter = "none" },
  { root = "src" },
]

[tool.ruff]
line-length = 100
target-version = "py312"
indent-width = 2

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["active_listener", "eavesdrop"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[dependency-groups]
dev = [
    "basedpyright>=1.35.0",
    "pytest>=8.3.5",
    "pytest-asyncio>=0.24.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
